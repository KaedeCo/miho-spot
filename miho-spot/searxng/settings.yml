# SearXNG settings for Miho-spot debate search
use_default_settings: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "zh-CN"
  formats:
    - html
    - json

server:
  secret_key: "miho-spot-debate-search-2026"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  public_instance: false
  image_proxy: false

# 启用中文搜索引擎
engines:
  # 主力搜索引擎
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  # 中文搜索引擎
  - name: bing news
    engine: bing_news
    shortcut: bin
    disabled: false

  - name: duckduckgo news
    engine: duckduckgo_news
    shortcut: ddgn
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
